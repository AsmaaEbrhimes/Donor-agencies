<section class="menue">
  <img class="logo-menue" src="assets/Img/logo 8.png" />
  <ul>
    @for (item of menue(); track $index) {
      <li [ngClass]="{'active': $index === 0}">
        <span>{{ item.name }}</span>
        <svg-icon class="svg_icon_menue" [src]="item.icon"> </svg-icon>
      </li>
    }
  </ul>
</section>
