<section class="wrapper-section-header">
  <div class="tool_user">
    <div class="icons_header">

      <button aria-label="logout" (click)="onLogout()">
        <svg-icon class="logout icon" src="assets/Svg/logout-05.svg"> </svg-icon>
      </button>

      <button aria-label="setting" [routerLink]="['/Dashboard/dashboard/setting']">
        <svg-icon class="setting icon" src="assets/Svg/Vector_setting.svg"> </svg-icon>
      </button>

      <button>
        <svg-icon
          (click)="op.toggle($event)"
          class="notification icon"
          src="assets/Svg/Vector (1).svg"
        >
        </svg-icon>
      </button>
      <button aria-label="meeting" [routerLink]="['/Dashboard/dashboard/meeting']">
        <svg-icon class="calnder icon" src="assets/Svg/calendar.svg"> </svg-icon>
      </button>

      <button (click)="OnToggel()" class="toggel_menue">≡</button>
    </div>

    <div class="user_info">
      <div>
        <h5>خالد القحطاني</h5>
        <p>Khalid270@gmail.com</p>
      </div>
      <svg-icon class="calnder icon" src="assets/Svg/Image-50.svg"> </svg-icon>
    </div>
  </div>

  <div class="input_user">
    <input placeholder="... أبحث 🔍" />
  </div>
</section>

<p-drawer [(visible)]="visible2" position="right">
  <app-side-nav></app-side-nav>
</p-drawer>

<p-popover #op>
  <app-notivication></app-notivication>
</p-popover>


<app-logout [openDilog]="visiblePopupLogout()" (DilogChange)="onCloseLogout()"></app-logout>
