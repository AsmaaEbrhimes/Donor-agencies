@if (statusData() == 'has-data') {
  <div class="table-container">
  <p-table
    [value]="tableData"
    [paginator]="true"
    [rowsPerPageOptions]="[5, 10, 20, 50]"
    [rows]="20"
    [tableStyle]="{ 'min-width': '50rem' }"
    [sortOrder]="-1"
  >
    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <ng-container *ngFor="let col of bodytabel">
          <th [pSortableColumn]="col.value" style="background-color: #f2f3fb; text-align: center">
            <div class="table-header-content">
              {{ col.key }}
              <p-sortIcon [field]="col.value" />
            </div>
          </th>
        </ng-container>

        <th
          *ngIf="getTemplate('actions')"
          style="background-color: #f2f3fb; text-align: center"
        ></th>
      </tr>
    </ng-template>

    <!-- BODY -->

    <ng-template pTemplate="body" let-row>
      <tr>
        <ng-container *ngFor="let col of bodytabel">
          <td style="text-align: center">
            <ng-container
              *ngTemplateOutlet="
                getTemplate(col.value) || defaultCell;
                context: { $implicit: row, column: col }">
            </ng-container>

            <ng-template #defaultCell>
              {{ row[col.value] }}
            </ng-template>
          </td>
        </ng-container>

        <td *ngIf="getTemplate('actions')" style="text-align: center">
          <ng-container *ngTemplateOutlet="getTemplate('actions'); context: { $implicit: row }">
          </ng-container>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <ng-content></ng-content>
  </div>
}

@else if (statusData() == 'no-data') {
  <app-no-data></app-no-data>
} @else {
  <p-table [value]="$any(loadingData)" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <ng-container *ngFor="let col of bodytabel">
          <th>{{ col.value }}</th>
        </ng-container>
      </tr>
    </ng-template>
    <ng-template pTemplate="body">
      <tr>
        <td *ngFor="let col of bodytabel"><p-skeleton /></td>
      </tr>
    </ng-template>
  </p-table>
}
